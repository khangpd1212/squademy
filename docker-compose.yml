services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: squademy
      POSTGRES_USER: squademy
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://squademy:${DB_PASSWORD}@postgres:5432/squademy
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: "3001"
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
